<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>News & Updates | ir-pt Edtech Bhopal</title>
<meta name="description" content="Latest news, admission updates, career tips, and events from ir-pt Edtech Bhopal.">
<link rel="canonical" href="https://www.irptedtech.com/news.html"><link rel="icon" href="/images/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.news-filters{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 18px}
.nf{padding:7px 16px;border-radius:20px;border:1.5px solid var(--lt);background:#fff;color:var(--gray);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.nf.active,.nf:hover{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.news-card{background:#fff;border-radius:12px;overflow:hidden;border:1.5px solid var(--lt);transition:all .28s;cursor:pointer}
.news-card:hover{transform:translateY(-2px);box-shadow:var(--s-md);border-color:rgba(212,160,23,.2)}
.nc-img{height:130px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,var(--ink),var(--sage2))}
.nc-body{padding:16px}
.nc-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.nc-title{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:6px;line-height:1.4}
.nc-exc{font-size:12px;color:var(--gray);line-height:1.65;margin-bottom:9px}
.nc-meta{font-size:11px;color:var(--gray)}
.nc-rm{font-size:13px;color:var(--sage);font-weight:700;display:inline-flex;align-items:center;gap:3px;margin-top:9px;transition:color .2s}
.news-card:hover .nc-rm{color:var(--gold)}
.art-back{display:inline-flex;align-items:center;gap:5px;color:var(--sage);font-weight:600;font-size:14px;cursor:pointer;margin-bottom:20px;background:none;border:none;padding:0;transition:color .2s}
.art-back:hover{color:var(--gold)}
.art-title{font-size:clamp(22px,4vw,34px);font-weight:900;color:var(--ink);line-height:1.2;margin-bottom:11px}
.art-meta{font-size:13px;color:var(--gray);margin-bottom:20px}
.art-content{font-size:15px;color:var(--gray);line-height:1.85}
.art-ctas{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px;padding-top:20px;border-top:1px solid var(--lt)}
.t-Adm{background:rgba(45,106,79,.1);color:var(--sage)}
.t-Car{background:rgba(212,160,23,.1);color:var(--gold2)}
.t-Pla{background:rgba(82,183,136,.12);color:#1a7a50}
.t-Eve{background:rgba(13,27,42,.07);color:var(--ink)}
.t-Ann{background:rgba(45,106,79,.1);color:var(--sage)}
</style>
</head>
<body>
<div id="nav-slot"></div><div id="wa-slot"></div>
<div class="page-hdr">
  <div class="mw">
    <div class="breadcrumb"><a href="/index.html">Home</a> → News</div>
    <h1>News & Announcements</h1>
    <p>Stay updated with the latest admission news, career tips, and events from ir-pt Edtech.</p>
  </div>
</div>
<div id="ticker-slot"></div>

<section class="sp" style="background:var(--off)">
  <div class="mw">
    <div id="listView">
      <div class="news-filters reveal">
        <button class="nf active" onclick="filterNews('',this)">All</button>
        <button class="nf" onclick="filterNews('Admissions',this)">Admissions</button>
        <button class="nf" onclick="filterNews('Career Tips',this)">Career Tips</button>
        <button class="nf" onclick="filterNews('Placement',this)">Placement</button>
        <button class="nf" onclick="filterNews('Events',this)">Events</button>
        <button class="nf" onclick="filterNews('Announcement',this)">Announcements</button>
      </div>
      <div id="newsGrid" class="news-grid"><div class="loader"><div class="spinner"></div>Loading news...</div></div>
    </div>
    <div id="articleView" style="display:none">
      <div style="max-width:680px;margin:0 auto">
        <button class="art-back" onclick="showList()">← Back to News</button>
        <div id="artContent"></div>
      </div>
    </div>
  </div>
</section>
<div id="footer-slot"></div>
<script src="/js/shared.js"></script>
<script>
let allNews=[];
const tagCls={'Admissions':'t-Adm','Career Tips':'t-Car','Placement':'t-Pla','Events':'t-Eve','Announcement':'t-Ann'};

async function loadNews(){
  try{
    const d=await apiGet('/news');
    allNews=d.news||[];
    renderNews(allNews);
    const p=new URLSearchParams(location.search);
    if(p.get('article')){const a=allNews.find(n=>n.slug===p.get('article'));if(a)showArticle(a);}
  }catch(e){
    document.getElementById('newsGrid').innerHTML='<div class="empty"><h3>Could not load news</h3><p>Please check back later.</p></div>';
  }
}

function renderNews(list){
  if(!list.length){document.getElementById('newsGrid').innerHTML='<div class="empty"><h3>No articles yet</h3></div>';return;}
  document.getElementById('newsGrid').innerHTML=list.map(n=>{
    const tag=tagCls[n.category]||'t-Ann';
    return`<div class="news-card" onclick="showArticle(${JSON.stringify(n).replace(/"/g,'&quot;')})">
      <div class="nc-img">${n.emoji||'📰'}</div>
      <div class="nc-body">
        <div class="nc-tag ${tag}">${n.category}</div>
        <div class="nc-title">${n.title}</div>
        <div class="nc-exc">${n.excerpt||''}</div>
        <div class="nc-meta">📅 ${fmtDate(n.createdAt)}</div>
        <div class="nc-rm">Read more →</div>
      </div>
    </div>`;
  }).join('');
}

function filterNews(cat,btn){
  document.querySelectorAll('.nf').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNews(cat?allNews.filter(n=>n.category===cat):allNews);
}

function showArticle(article){
  if(typeof article==='string') article=JSON.parse(decodeURIComponent(article));
  const tag=tagCls[article.category]||'t-Ann';
  document.getElementById('artContent').innerHTML=`
    <div class="nc-tag ${tag}">${article.category}</div>
    <h1 class="art-title">${article.emoji||'📰'} ${article.title}</h1>
    <div class="art-meta">📅 ${fmtDate(article.createdAt)}</div>
    <div class="art-content">${(article.content||'').replace(/\n/g,'<br>')}</div>
    <div class="art-ctas">
      <a href="https://wa.me/918223063535?text=${encodeURIComponent('Hi! I read about '+article.title+' and want to know more.')}" target="_blank" class="btn btn-wa"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Ask on WhatsApp</a>
      <a href="tel:8223063535" class="btn btn-gold">📞 Call Us</a>
      <a href="/index.html#enquire" class="btn btn-mint">Free Counselling</a>
    </div>`;
  document.getElementById('listView').style.display='none';
  document.getElementById('articleView').style.display='block';
  if(article.slug) history.pushState({},'','?article='+article.slug);
  window.scrollTo({top:0,behavior:'smooth'});
}

function showList(){
  document.getElementById('listView').style.display='block';
  document.getElementById('articleView').style.display='none';
  history.pushState({},'','news.html');
}
window.addEventListener('popstate',()=>showList());
loadNews();
</script>
</body></html>
