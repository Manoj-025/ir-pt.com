<script>
const faqData={
  students:[
    {q:"Which course should I take after 12th Science?",a:"It depends on your interests. If you like computers — B.Tech CS or BCA. Biology — MBBS, B.Pharma. Not sure? Book a free session — we assess your strengths and find the best fit."},
    {q:"What is the difference between BCA and B.Tech?",a:"B.Tech is a 4-year engineering degree (fees ₹80K–1.2L/yr). BCA is a 3-year computer applications degree (fees ₹35K–60K/yr). Both lead to IT careers. BCA is more affordable and shorter."},
    {q:"What is the last date for admissions 2026–27?",a:"Most Bhopal colleges close by June–July 2026. Some accept till September. Contact us immediately to check seat availability and avoid missing deadlines."},
    {q:"Can I change my course after 1st year?",a:"Yes, in some cases. Branch change in engineering requires a qualifying CGPA. For full course changes, re-application is needed. Our counsellors will guide you."},
    {q:"Is counselling really free?",a:"Completely free! We earn through college partnerships, not from students. Initial session + personalised guidance = ₹0. No hidden charges whatsoever."},
    {q:"What career options are there after 12th Commerce?",a:"Top options: BBA then MBA, CA (Chartered Accountancy), B.Com, Digital Marketing, Finance and Banking, E-Commerce. Book a session to find the right fit for your specific strengths."}
  ],
  parents:[
    {q:"How do I know which college is best for my child?",a:"Look at placement records, infrastructure, NAAC rating, and fees. We provide personalised comparisons of top Bhopal colleges based on your child's stream, interests, and your budget."},
    {q:"What is a reasonable college fee in Bhopal?",a:"Government colleges: ₹15K–35K/yr. Private colleges: ₹40K–1.2L/yr. Engineering tends to be higher. We find the best value options without compromising quality."},
    {q:"Is it safe to pay through your consultancy?",a:"We never collect college fees. All payments go directly to the college. We only assist the admission process. 100% transparent and safe."},
    {q:"What if my child is not placed after college?",a:"We provide post-placement support even after graduation. Our network includes Bhopal companies and beyond. We stay with your child until they are placed."},
    {q:"Can we visit your office?",a:"Absolutely! LG-03, Sagar Landmark Complex, Ayodhya Bypass Road, Bhopal. Monday to Saturday, 10am to 6pm. No appointment needed."},
    {q:"What makes ir-pt Edtech different from others?",a:"We are the only consultancy in Bhopal that offers career counselling, college admissions, project help, placement support, and a job finder — all under one roof. And our initial guidance is always free."}
  ],
  admissions:[
    {q:"What documents are needed for admission?",a:"10th and 12th marksheets, transfer certificate, character certificate, passport photos, Aadhaar card, domicile certificate. Some colleges also need income certificate for scholarships."},
    {q:"Can I get a scholarship?",a:"Yes! Merit-based scholarships are available at most colleges. Government scholarships through MP Scholarship Portal for OBC/SC/ST students. We help you apply for all relevant scholarships."},
    {q:"What if I scored low marks in 12th?",a:"Many good colleges accept 45–50% marks. Some offer bridging courses or management quota seats. We will find the right match for your score — no judgement."},
    {q:"Can out-of-state students apply?",a:"Yes! Most private colleges accept students from other states. Some have management quota seats for this. Contact us with your details and we will check eligibility."}
  ],
  services:[
    {q:"What is project and thesis support?",a:"We help with final year projects — topic selection, synopsis, implementation, report writing, and viva preparation. Over 200 students helped across engineering, MBA, BCA, and MCA."},
    {q:"How long does placement support take?",a:"Resume building: 3–5 days. Mock interviews: 1 week. Job referrals: ongoing. Most students get interview calls within 2–4 weeks."},
    {q:"Do you have certified skill courses?",a:"Yes! Short-term certified courses (1–3 months) in Web Development, Digital Marketing, MS Office, Communication Skills. Includes certification recognised by employers."},
    {q:"Can I track my admission status online?",a:"Yes! Visit our Track Status page and enter your registered phone number to see a live timeline of your application progress."}
  ]
};

function switchFaq(tab,btn){
  document.querySelectorAll('.ft').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('faqList').innerHTML=faqData[tab].map((f,i)=>`
    <div class="faq-item"><div class="faq-q" onclick="this.parentElement.classList.toggle('open')"><div class="faq-qt">${f.q}</div><div class="faq-ic">+</div></div><div class="faq-a">${f.a}</div></div>`).join('');
}
switchFaq('students',document.querySelector('.ft'));
</script>
